<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聯絡表單</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        
        .form-gradient {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }
        .input-focus {
            transition: all 0.2s ease;
        }
        .input-focus:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            outline: none;
        }
    </style>
</head>

<!-- 需求 1: 頂端 Logo 照片 -->
            <a href="#" class="flex items-center space-x-3">
                <img src="https://lh3.googleusercontent.com/d/1RmtqRvUs_QiHEGrfGhbphG30uZrLzNeY" alt="水電阿宏 Logo" class="h-10 w-auto md:h-12 object-contain" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                <!-- 如果 logo.png 載入失敗，會顯示下方的備用圖示 -->
                <div class="hidden w-8 h-8 md:w-10 md:h-10 bg-blue-600 rounded-lg items-center justify-center text-white">
                    <i class="fas fa-wrench"></i>
                </div>
                <span class="text-xl md:text-2xl font-black text-blue-900 tracking-tight">水電阿宏</span>
            </a>

<body class="bg-transparent md:p-4">
    <div class="max-w-md mx-auto bg-white p-8 rounded-[2rem] shadow-xl shadow-blue-900/5 border border-gray-100">
        <div class="flex items-center space-x-3 mb-8">
            <div class="w-2 h-8 bg-blue-600 rounded-full"></div>
            <h2 class="text-2xl font-black text-gray-800 tracking-tight">個人資料</h2>
        </div>

        <form id="contactForm" class="space-y-5">
            <div>
                <label class="block text-sm font-bold text-gray-600 mb-2 ml-1">您的姓名</label>
                <input type="text" name="name" placeholder="範例：王小明" required 
                    class="input-focus w-full bg-gray-50 border border-gray-200 rounded-xl p-3.5 text-gray-700 placeholder-gray-400">
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-600 mb-2 ml-1">電子郵件 / LINE ID</label>
                <input type="text" name="email" placeholder="方便我們聯絡您的方式" required 
                    class="input-focus w-full bg-gray-50 border border-gray-200 rounded-xl p-3.5 text-gray-700 placeholder-gray-400">
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-600 mb-2 ml-1">問題描述</label>
                <textarea name="message" rows="4" placeholder="請簡述您的水電需求（如：廚房龍頭漏水、插座增設...）" required 
                    class="input-focus w-full bg-gray-50 border border-gray-200 rounded-xl p-3.5 text-gray-700 placeholder-gray-400 resize-none"></textarea>
            </div>

            <button type="submit" id="submitBtn" 
                class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-700 active:scale-[0.98] transition-all shadow-lg shadow-blue-200 flex items-center justify-center">
                <span>送出需求</span>
                <i class="fas fa-paper-plane ml-2 text-sm opacity-70"></i>
            </button>
        </form>

        <!-- 成功/失敗 狀態顯示區 -->
        <div id="statusBox" class="mt-6 hidden">
            <div id="statusContent" class="flex items-center justify-center p-4 rounded-xl text-sm font-medium">
                <i id="statusIcon" class="mr-2"></i>
                <span id="statusText"></span>
            </div>
            <p class="text-[10px] text-gray-400 mt-2 text-center">※ 收到訊息後，阿宏會儘快與您聯絡</p>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzAEX_TCUIhmpuc-0nmc2_tpf-SVcgsSfrRWbuVfMHPdv_Bn_8ZKRCAB4N1iGdtSK8ivA/exec";

        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const statusBox = document.getElementById('statusBox');
            const statusContent = document.getElementById('statusContent');
            const statusIcon = document.getElementById('statusIcon');
            const statusText = document.getElementById('statusText');
            
            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-circle-notch animate-spin mr-2"></i> 傳送中...`;
            
            const formData = new URLSearchParams(new FormData(this));

            fetch(GAS_URL, {
                method: 'POST',
                body: formData,
                mode: 'no-cors'
            })
            .then(() => {
                // 成功狀態
                statusBox.classList.remove('hidden');
                statusContent.className = "flex items-center justify-center p-4 rounded-xl text-sm font-medium bg-green-50 text-green-700 border border-green-100";
                statusIcon.className = "fas fa-check-circle mr-2";
                statusText.innerText = "資料已送出，我會儘快回覆您！";
                this.reset();
            })
            .catch(err => {
                // 失敗狀態
                statusBox.classList.remove('hidden');
                statusContent.className = "flex items-center justify-center p-4 rounded-xl text-sm font-medium bg-red-50 text-red-700 border border-red-100";
                statusIcon.className = "fas fa-exclamation-triangle mr-2";
                statusText.innerText = "傳送失敗，請直接撥打電話或 LINE 聯絡。";
            })
            .finally(() => {
                btn.disabled = false;
                btn.innerHTML = `<span>重新送出</span><i class="fas fa-paper-plane ml-2 text-sm opacity-70"></i>`;
            });
        });
    </script>
</body>
</html>
