<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修正後的 SVG 標誌動畫</title>
    <style>
        :root {
            --bg-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .svg-container {
            width: 90vw;
            max-width: 800px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1));
        }

        /* 核心動畫邏輯 */
        #animated-content {
            /* 調整轉換中心點，確保旋轉感自然 */
            transform-origin: center center;
            animation: wind-sway 4s ease-in-out infinite;
        }

        @keyframes wind-sway {
            0%, 100% {
                transform: rotate(0deg) skewX(0deg) scale(1);
            }
            25% {
                transform: rotate(2deg) skewX(1deg) scale(1.02);
            }
            50% {
                transform: rotate(-1deg) skewX(-1deg) scale(1);
            }
            75% {
                transform: rotate(1.5deg) skewX(0.5deg) scale(1.01);
            }
        }
    </style>
</head>
