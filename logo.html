<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 843" width="100%" height="auto">
  <style>
    /* 動定義動畫邏輯 */
    @keyframes rotateAndShrink {
      0% {
        transform: rotate(0deg) scale(1);
	opacity: 1;
      }
      10% {
        transform: rotate(10deg) scale(0.98);
	opacity: 1;
      }

      100% {
        transform: rotate(720deg) scale(0.1);
	opacity: 0.3;
      }
    }

    @keyframes shrink {
      0% {
        transform: rotate(0deg) scale(1);
	opacity: 1;
      }
      10% {
        transform: rotate(0deg) scale(0.98);
	opacity: 1;
      }
      100% {
        transform: rotate(0deg) scale(0.1);
	opacity: 0.3;
      }
    }

    #animated-content {
      /* 設定旋轉中心為圖案中心 */
      transform-origin: center;
      transform-box: fill-box;
      
      /* 執行動畫：3秒完成、無限循環、來回播放 */
      animation: shrink 3s ease-in-out infinite alternate;
    }

/* 定義第二種動畫：呼吸縮放與光影閃爍 (新增) */
/* 特點：透過微小的縮放與不透明度變化，產生類似霓虹或呼吸的律動感 */
@keyframes breathAndGlow {
  0% {
    transform: scale(1);
    opacity: 1;
    filter: drop-shadow(0 0 0px rgba(252, 12, 12, 0));
  }
  50% {
    transform: scale(1.05); /* 微幅放大 */
    opacity: 0.7;           /* 稍微變淡 */
    filter: drop-shadow(0 0 8px rgba(252, 12, 12, 0.6)); /* 產生發光感 */
  }
  100% {
    transform: scale(0.95); /* 微幅縮小 */
    opacity: 1;
    filter: drop-shadow(0 0 0px rgba(252, 12, 12, 0));
  }
}

    #animated-content2 {
      transform-origin: center;
  transform-box: fill-box;
  /* 如果要使用你原本的動畫，取消下面註解 */
  /* animation: rotateAndShrink 3s ease-in-out infinite alternate; */
  
  /* 目前套用新動畫：3秒完成、無限循環 */
/*  animation: breathAndGlow 3s ease-in-out infinite;*/
    }


/* 定義第三種動畫：旋轉門 (Y 軸翻轉) - 新增 */
    /* 使用 perspective 增加一點立體深度感，雖然 SVG 對此支援有限，但 rotateY 效果依然顯著 */
    @keyframes winFlip {
      0% {
        transform: rotateX(0deg);
      }
      10% {
      }  transform: rotateX(2deg);
      
      30% {
        transform: rotateX(45deg);
      }
      100% {
        transform: rotateX(90deg);
      }
    }

    #animated-content3 {
      transform-origin: center;
      transform-box: fill-box;
      
      /* 目前套用旋轉門動畫：3秒完成、無限循環 */
      /* 使用 linear 會讓旋轉看起來很機械化，ease-in-out 則會有物理慣性的感覺 */
      animation: winFlip 3s ease-in-out infinite alternate;
    }

@keyframes doorFlip {
      0% { transform: rotateY(0deg); }
      10% { transform: rotateY(3deg); }
      100% { transform: rotateY(90deg); }
    }


    #animated-content4 {
      /* 設定旋轉中心：X 軸由中心往右偏 100px，Y 軸維持中心 */
      /* 注意：在某些瀏覽器中 calc 在 SVG style 可能有相容性問題，若失效請改用百分比估算（如 80% 50%） */
      transform-origin: calc(50% + 250px) 50%;
      transform-box: fill-box;
      
      /* 執行動畫 */
      animation: doorFlip 3s ease-in-out infinite alternate;
    }

    #animated-content5 {
      /* 設定旋轉中心為圖案中心 */
      transform-origin: center;
      transform-box: fill-box;
      
      /* 執行動畫：3秒完成、無限循環、來回播放 */
      animation: rotateAndShrink 3s ease-in-out infinite alternate;
    }


  </style>

  /* 縮小容器至原來的 1/10 左右 */
        .svg-container {
            width: 150px; 
            height: 84.3px;
        }
